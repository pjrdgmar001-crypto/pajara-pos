<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pajara POS - เข้าสู่ระบบ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 420px;
      max-width: 95vw;
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 3rem; }
    .logo-text { font-size: 1.6rem; font-weight: 700; color: #4f46e5; margin-top: 4px; }
    .logo-sub { color: #6b7280; font-size: 0.9rem; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .form-label { font-weight: 600; color: #374151; }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none; color: white; width: 100%;
      padding: 13px; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .btn-login:disabled { opacity: 0.7; }
    .role-select {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .role-btn {
      flex: 1; padding: 10px; border: 2px solid #e5e7eb;
      border-radius: 12px; cursor: pointer; text-align: center;
      transition: all 0.15s; background: white;
      font-family: 'Sarabun', sans-serif;
    }
    .role-btn.active { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; }
    .role-btn i { display: block; font-size: 1.5rem; margin-bottom: 4px; }
    .version-badge { text-align: center; margin-top: 20px; }
    .version-badge span { background: #f3f4f6; border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-icon">🛍️</div>
      <div class="logo-text">Pajara POS</div>
      <div class="logo-sub">ระบบขายหน้าร้าน</div>
    </div>

    <div id="alert-box" class="alert d-none mb-3"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">อีเมล</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login" id="login-btn">
        <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
        <span id="login-text">เข้าสู่ระบบ</span>
      </button>
    </form>

    <div class="version-badge">
      <span>Pajara POS v1.0 · 2025</span>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      const alertBox = document.getElementById('alert-box');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      alertBox.className = 'alert d-none';

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        const userDoc = await db.collection('users').doc(cred.user.uid).get();
        const role = userDoc.exists ? userDoc.data().role : 'staff';
        window.location.href = role === 'admin' ? 'admin.html' : 'pos.html';
      } catch (err) {
        alertBox.className = 'alert alert-danger';
        const msgs = {
          'auth/user-not-found': 'ไม่พบบัญชีนี้ในระบบ',
          'auth/wrong-password': 'รหัสผ่านไม่ถูกต้อง',
          'auth/invalid-email': 'รูปแบบอีเมลไม่ถูกต้อง',
          'auth/too-many-requests': 'ลองใหม่ภายหลัง (มีการพยายาม login มากเกินไป)',
          'auth/invalid-credential': 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
        };
        alertBox.textContent = msgs[err.code] || err.message;
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });

    // Auto-redirect if already logged in
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          const userDoc = await db.collection('users').doc(user.uid).get();
          const role = userDoc.exists ? userDoc.data().role : 'staff';
          window.location.href = role === 'admin' ? 'admin.html' : 'pos.html';
        } catch (_) {}
      }
    });
  </script>
</body>
</html>
