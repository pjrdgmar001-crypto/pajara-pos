<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pajara POS - เข้าสู่ระบบ</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Sarabun', sans-serif; }
    body {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #a855f7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: white;
      border-radius: 24px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.3);
      padding: 48px 40px;
      width: 420px;
      max-width: 95vw;
    }
    .logo-area { text-align: center; margin-bottom: 32px; }
    .logo-icon { font-size: 3rem; }
    .logo-text { font-size: 1.6rem; font-weight: 700; color: #4f46e5; margin-top: 4px; }
    .logo-sub { color: #6b7280; font-size: 0.9rem; }
    .form-control:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .form-label { font-weight: 600; color: #374151; }
    .btn-login {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none; color: white; width: 100%;
      padding: 13px; border-radius: 12px;
      font-size: 1rem; font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; color: white; }
    .btn-login:disabled { opacity: 0.7; }
    .role-select {
      display: flex; gap: 12px; margin-bottom: 20px;
    }
    .role-btn {
      flex: 1; padding: 10px; border: 2px solid #e5e7eb;
      border-radius: 12px; cursor: pointer; text-align: center;
      transition: all 0.15s; background: white;
      font-family: 'Sarabun', sans-serif;
    }
    .role-btn.active { border-color: #7c3aed; background: #f5f3ff; color: #7c3aed; }
    .role-btn i { display: block; font-size: 1.5rem; margin-bottom: 4px; }
    .version-badge { text-align: center; margin-top: 20px; }
    .version-badge span { background: #f3f4f6; border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; color: #9ca3af; }
  </style>
</head>
<body>
  <!-- หน้า Login -->
  <div class="login-card" id="login-card">
    <div class="logo-area">
      <div class="logo-icon">🛍️</div>
      <div class="logo-text">Pajara POS</div>
      <div class="logo-sub">ระบบขายหน้าร้าน</div>
    </div>

    <div id="alert-box" class="alert d-none mb-3"></div>

    <form id="login-form">
      <div class="mb-3">
        <label class="form-label">อีเมล</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" class="form-control" id="email" placeholder="your@email.com" required autocomplete="email">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
          <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-login" id="login-btn">
        <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
        <span id="login-text">เข้าสู่ระบบ</span>
      </button>
    </form>

    <div class="version-badge">
      <span>Pajara POS v1.1 · 2025</span>
    </div>
  </div>

  <!-- หน้าเลือกสาขา (แสดงหลัง login สำหรับ staff ที่มีหลายสาขา) -->
  <div class="login-card d-none" id="branch-card" style="width:480px;max-width:95vw">
    <div class="logo-area">
      <div class="logo-icon">🏪</div>
      <div class="logo-text" id="branch-user-name">เลือกสาขา</div>
      <div class="logo-sub" id="branch-user-email"></div>
    </div>
    <p class="text-center text-muted mb-3" style="font-size:0.9rem">เลือกสาขาที่ต้องการเข้าใช้งาน</p>
    <div id="branch-list" class="row g-2"></div>
    <div class="version-badge mt-3">
      <button class="btn btn-sm btn-link text-muted" onclick="doLogoutFromBranch()">
        <i class="bi bi-box-arrow-left me-1"></i>ออกจากระบบ
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script>
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Toggle password visibility
    document.getElementById('toggle-pw').addEventListener('click', function() {
      const pw = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pw.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });

    async function handleUserAfterLogin(user) {
      const userDoc = await db.collection('users').doc(user.uid).get();
      const userData = userDoc.exists ? userDoc.data() : {};
      const role = userData.role || 'staff';

      if (role === 'admin') {
        sessionStorage.setItem('selectedBranch', '__all__');
        sessionStorage.setItem('selectedBranchName', 'ทั้งหมด');
        window.location.href = 'admin.html';
        return;
      }

      // staff: ตรวจสอบสาขาที่เข้าถึงได้
      const allowedBranches = userData.branches || [];
      if (allowedBranches.length === 0) {
        // ไม่มีสาขาที่กำหนด → เข้า pos ได้แบบไม่มีสาขาเฉพาะ (backward compat)
        sessionStorage.setItem('selectedBranch', 'main');
        sessionStorage.setItem('selectedBranchName', 'สาขาหลัก');
        window.location.href = 'pos.html';
        return;
      }

      if (allowedBranches.length === 1) {
        // สาขาเดียว → เข้าตรง
        const branchSnap = await db.collection('branches').doc(allowedBranches[0]).get();
        const branchName = branchSnap.exists ? branchSnap.data().name : allowedBranches[0];
        sessionStorage.setItem('selectedBranch', allowedBranches[0]);
        sessionStorage.setItem('selectedBranchName', branchName);
        window.location.href = 'pos.html';
        return;
      }

      // หลายสาขา → แสดงหน้าเลือกสาขา
      const branchSnaps = await Promise.all(allowedBranches.map(id => db.collection('branches').doc(id).get()));
      const branches = branchSnaps.map((snap, i) => ({
        id: allowedBranches[i],
        name: snap.exists ? snap.data().name : allowedBranches[i]
      }));

      document.getElementById('login-card').classList.add('d-none');
      document.getElementById('branch-card').classList.remove('d-none');
      document.getElementById('branch-user-name').textContent = userData.name || user.email;
      document.getElementById('branch-user-email').textContent = user.email;

      document.getElementById('branch-list').innerHTML = branches.map(b => `
        <div class="col-6">
          <button class="btn w-100 py-3" style="border:2px solid #e5e7eb;border-radius:14px;font-family:inherit;font-size:0.95rem;font-weight:600;background:white;transition:all 0.15s"
            onmouseover="this.style.borderColor='#7c3aed';this.style.background='#f5f3ff'"
            onmouseout="this.style.borderColor='#e5e7eb';this.style.background='white'"
            onclick="selectBranch('${b.id}','${b.name.replace(/'/g,"\\'")}')">
            <i class="bi bi-shop-window d-block mb-1" style="font-size:1.5rem;color:#7c3aed"></i>
            ${b.name}
          </button>
        </div>`).join('');
    }

    function selectBranch(id, name) {
      sessionStorage.setItem('selectedBranch', id);
      sessionStorage.setItem('selectedBranchName', name);
      window.location.href = 'pos.html';
    }

    function doLogoutFromBranch() {
      auth.signOut().then(() => {
        document.getElementById('branch-card').classList.add('d-none');
        document.getElementById('login-card').classList.remove('d-none');
      });
    }

    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const spinner = document.getElementById('login-spinner');
      const alertBox = document.getElementById('alert-box');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      alertBox.className = 'alert d-none';

      try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        await handleUserAfterLogin(cred.user);
      } catch (err) {
        alertBox.className = 'alert alert-danger';
        const msgs = {
          'auth/user-not-found': 'ไม่พบบัญชีนี้ในระบบ',
          'auth/wrong-password': 'รหัสผ่านไม่ถูกต้อง',
          'auth/invalid-email': 'รูปแบบอีเมลไม่ถูกต้อง',
          'auth/too-many-requests': 'ลองใหม่ภายหลัง (มีการพยายาม login มากเกินไป)',
          'auth/invalid-credential': 'อีเมลหรือรหัสผ่านไม่ถูกต้อง'
        };
        alertBox.textContent = msgs[err.code] || err.message;
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });

    // Auto-redirect if already logged in
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        try {
          await handleUserAfterLogin(user);
        } catch (_) {}
      }
    });
  </script>
</body>
</html>
